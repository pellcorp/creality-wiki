# Project information
site_name: SimpleAF
site_url: https://pellcorp.github.io/Simple-AF-Wiki/
site_author: Chris van Liere
site_description: Documentation

# Repository
repo_name: GitHub
repo_url: https://github.com/pellcorp/Simple-AF-Wiki

# Copyright
copyright: SimpleAF &copy; All rights reserved

# Configuration
theme:
  name: material
  language: en
  favicon: assets/images/favicon.png
  logo: assets/logo.png
  
  font:
    text: Robonto
    code: Roboto Mono

  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode

  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - header.autohide
    - navigation.top
    - navigation.indexes
    - navigation.sections
    - navigation.path
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - content.footnote.tooltips
    - content.tabs.link

# Extra styling CSS/Java
extra_css:
    - stylesheets/extra.css

# Plugins
plugins:
    - search:
        lang: en

# Additional Configuration
extra:
  generator: false
  social:
    - icon: simple/kofi
      link: https://ko-fi.com/pellcorp49698
    - icon: material/hand-coin
      link: https://gofund.me/2033eedb
    - icon: simple/github
      link: https://github.com/pellcorp
    - icon: simple/discord
      link: https://discord.gg/tGGVn5qjgv

# Extensions
markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.blocks.caption
  - toc:
      title: On this page
        
  - tables
  - admonition
  - footnotes
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.tasklist:
      custom_checkbox: true

# Page tree
nav:
  - Intro: index.md
  - Markdown: changelog.md
  - FAQ: FAQ.md
  - Installation:
    - Cartographer: installation/probes/cartographer.md